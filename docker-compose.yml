version: "3.8"

# This compose file starts postgres + backend + simulator + frontend (nginx) + Caddy (HTTPS).
# Copy .env.example → .env and fill in secrets before running.
# For local usage: docker-compose up --build → open http://localhost:3000

services:
  postgres:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: unbox-speedometer-backend:v1.0.0
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    # Port is intentionally not exposed externally — Caddy proxies to it.
    # Uncomment the line below only for local dev without Caddy.
    # ports:
    #   - "${PORT:-3001}:${PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy

  simulator:
    image: unbox-speedometer-simulator:v1.0.0
    build:
      context: ./backend
      dockerfile: Dockerfile.simulator
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: unbox-speedometer-frontend:v1.0.0
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty string → nginx proxies /api/ to backend; no CORS needed locally
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  pg_data:
  caddy_data:
  caddy_config:
